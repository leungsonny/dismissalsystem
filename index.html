<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YCPS (Hoi Wang Road) Dismissal System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; margin: 0; overflow: hidden; background-color: #f9fafb; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
      }
    }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, doc, onSnapshot, setDoc, collection } from "firebase/firestore";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";

        // --- ⚠️ PASTE YOUR FIREBASE CONFIG HERE ⚠️ ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'ycps-dismissal-v1';

        // Expose to window for the React script to access
        window.fb = { auth, db, appId, doc, onSnapshot, setDoc, collection };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            Clock, Shield, Users, CheckCircle, AlertCircle, School, 
            Settings, Sparkles, Megaphone, Loader2, X, Share2, Check 
        } = lucide;

        const GRADES = [1, 2, 3, 4, 5, 6];
        const SECTIONS = ['A', 'B', 'C', 'D', 'E'];
        const STATUS_LEVELS = ['IN_CLASS', 'PREPARING', 'DISMISSED'];

        const STATUS_CONFIG = {
            IN_CLASS: { label: '上課中', bgColor: 'bg-white', textColor: 'text-gray-400', borderColor: 'border-gray-200', icon: 'School' },
            PREPARING: { label: '準備中', bgColor: 'bg-amber-100', textColor: 'text-amber-700', borderColor: 'border-amber-400', icon: 'AlertCircle', animation: 'animate-pulse' },
            DISMISSED: { label: '已放學', bgColor: 'bg-green-100', textColor: 'text-green-700', borderColor: 'border-green-500', icon: 'CheckCircle' }
        };

        const INITIAL_CLASSES = [];
        GRADES.forEach(g => SECTIONS.forEach(s => INITIAL_CLASSES.push({ id: `${g}${s}`, status: 'IN_CLASS' })));

        function App() {
            const [user, setUser] = useState(null);
            const [viewMode, setViewMode] = useState('PARENT'); 
            const [classes, setClasses] = useState(INITIAL_CLASSES);
            const [broadcastMessage, setBroadcastMessage] = useState('');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [isGenerating, setIsGenerating] = useState(false);
            const [broadcastInput, setBroadcastInput] = useState('');
            const [toastMsg, setToastMsg] = useState('');

            useEffect(() => {
                const unsubAuth = window.fb.auth.onAuthStateChanged(u => {
                    if (!u) signInAnonymously(window.fb.auth);
                    setUser(u);
                });
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => { unsubAuth(); clearInterval(timer); };
            }, []);

            useEffect(() => {
                if (!user) return;
                const docRef = window.fb.doc(window.fb.db, 'school_state', 'current_v1');
                return window.fb.onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.classes) setClasses(data.classes);
                        if (data.broadcastMessage !== undefined) setBroadcastMessage(data.broadcastMessage);
                    } else {
                        window.fb.setDoc(docRef, { classes: INITIAL_CLASSES, broadcastMessage: '' });
                    }
                });
            }, [user]);

            const updateCloud = async (newClasses, newMsg) => {
                const docRef = window.fb.doc(window.fb.db, 'school_state', 'current_v1');
                await window.fb.setDoc(docRef, { 
                    classes: newClasses, 
                    broadcastMessage: newMsg !== undefined ? newMsg : broadcastMessage 
                }, { merge: true });
            };

            const handleClassClick = (id) => {
                if (viewMode !== 'ADMIN') return;
                const newClasses = classes.map(c => {
                    if (c.id === id) {
                        const next = STATUS_LEVELS[(STATUS_LEVELS.indexOf(c.status) + 1) % STATUS_LEVELS.length];
                        return { ...c, status: next };
                    }
                    return c;
                });
                setClasses(newClasses);
                updateCloud(newClasses, undefined);
            };

            const generateBroadcast = async () => {
                if (!broadcastInput.trim()) return;
                setIsGenerating(true);
                // Note: In production, call Gemini via a backend proxy to protect API Key
                const apiKey = "YOUR_GEMINI_API_KEY"; 
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({ contents: [{ parts: [{ text: `你是一位學校管理員，請用30字內專業地轉換關鍵字為放學廣播：${broadcastInput}` }] }] })
                    });
                    const data = await res.json();
                    const text = data.candidates[0].content.parts[0].text;
                    setBroadcastMessage(text);
                    updateCloud(classes, text);
                    setBroadcastInput('');
                } catch (err) { setToastMsg('API Error'); } finally { setIsGenerating(false); }
            };

            return (
                <div className="h-screen flex flex-col bg-gray-50 overflow-hidden">
                    <header className="bg-white border-b px-6 py-3 flex items-center justify-between shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-blue-800 rounded-full flex items-center justify-center text-white font-bold">YCPS</div>
                            <div>
                                <h1 className="text-xl font-black text-blue-900 leading-none">油蔴地天主教小學（海泓道）</h1>
                                <p className="text-xs font-bold text-gray-500 mt-1 uppercase tracking-widest">Real-time Dismissal Board</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right hidden md:block">
                                <div className="text-2xl font-black text-blue-900 tabular-nums">{currentTime.toLocaleTimeString()}</div>
                            </div>
                            <div className="bg-gray-100 p-1 rounded-xl flex">
                                <button onClick={() => setViewMode('PARENT')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${viewMode === 'PARENT' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>家長視角</button>
                                <button onClick={() => setViewMode('ADMIN')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${viewMode === 'ADMIN' ? 'bg-blue-600 text-white shadow-sm' : 'text-gray-500'}`}>管理員</button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 p-4 flex flex-col gap-4 overflow-hidden">
                        {broadcastMessage && (
                            <div className="bg-yellow-100 border-l-4 border-yellow-500 p-4 rounded-r-lg flex justify-between items-center animate-pulse">
                                <div className="flex items-center gap-3 font-bold text-yellow-800">
                                    <Megaphone size={24} /> <span>{broadcastMessage}</span>
                                </div>
                                {viewMode === 'ADMIN' && <button onClick={() => updateCloud(classes, '')}><X /></button>}
                            </div>
                        )}

                        {viewMode === 'ADMIN' && (
                            <div className="bg-white p-3 border rounded-xl flex gap-4 items-center shadow-sm">
                                <Sparkles className="text-blue-600" />
                                <input value={broadcastInput} onChange={e => setBroadcastInput(e.target.value)} placeholder="輸入關鍵字讓 AI 生成廣播..." className="flex-1 outline-none text-sm font-medium" />
                                <button onClick={generateBroadcast} disabled={isGenerating} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm">生成廣播</button>
                                <button onClick={() => updateCloud(INITIAL_CLASSES, '')} className="text-red-500 font-bold text-sm border-l pl-4">全部重置</button>
                            </div>
                        )}

                        <div className="flex-1 grid grid-cols-5 gap-3 overflow-y-auto custom-scrollbar pr-2">
                            {classes.map(cls => {
                                const cfg = STATUS_CONFIG[cls.status];
                                const Icon = lucide[cfg.icon];
                                return (
                                    <div key={cls.id} onClick={() => handleClassClick(cls.id)} className={`relative p-6 rounded-2xl border-2 transition-all flex flex-col items-center justify-center gap-2 ${cfg.bgColor} ${cfg.borderColor} ${viewMode === 'ADMIN' ? 'cursor-pointer active:scale-95' : ''}`}>
                                        <div className="text-4xl font-black text-slate-800">{cls.id}</div>
                                        <div className={`flex items-center gap-1 font-bold text-xs uppercase ${cfg.textColor}`}>
                                            <Icon size={14} className={cfg.animation || ''} /> {cfg.label}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {toastMsg && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black/80 text-white px-6 py-3 rounded-full font-bold">{toastMsg}</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
