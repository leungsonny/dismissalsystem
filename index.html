<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>油蔴地天主教小學（海泓道）- 放學系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; margin: 0; overflow: hidden; background-color: #f3f4f6; }
        .animate-marquee { animation: marquee 30s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
      }
    }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, doc, onSnapshot, setDoc } from "firebase/firestore";
        import { getAuth, signInAnonymously } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyADzOtEqHLfuoq5obExFdx2bqIEhRZM44I",
            authDomain: "school-dismissal-608be.firebaseapp.com",
            projectId: "school-dismissal-608be",
            storageBucket: "school-dismissal-608be.firebasestorage.app",
            messagingSenderId: "88033315516",
            appId: "1:88033315516:web:b617ed9cafcdabbcb45eb9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.fb = { auth, db, doc, onSnapshot, setDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const STATUS_ORDER = ['IN_CLASS', 'PREPARING', 'DISMISSED'];
        const STATUS_CONFIG = {
            IN_CLASS: { label: '上課中', bgColor: 'bg-white', textColor: 'text-gray-300', borderColor: 'border-gray-200' },
            PREPARING: { label: '準備中', bgColor: 'bg-amber-400', textColor: 'text-white', borderColor: 'border-amber-500' },
            DISMISSED: { label: '已放學', bgColor: 'bg-emerald-500', textColor: 'text-white', borderColor: 'border-emerald-600' }
        };

        const CLASSES_DATA = [];
        for (let g = 1; g <= 6; g++) {
            ['A', 'B', 'C', 'D', 'E'].forEach(s => CLASSES_DATA.push({ id: `${g}${s}`, status: 'IN_CLASS' }));
        }

        function App() {
            const [user, setUser] = useState(null);
            const [viewMode, setViewMode] = useState('PARENT'); 
            const [classes, setClasses] = useState(CLASSES_DATA);
            const [broadcast, setBroadcast] = useState('歡迎家長，請查看即時進度。');
            const [currentTime, setCurrentTime] = useState(new Date());

            useEffect(() => {
                const unsubAuth = window.fb.auth.onAuthStateChanged(u => {
                    if (!u) window.fb.signInAnonymously(window.fb.auth);
                    setUser(u);
                });
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => { unsubAuth(); clearInterval(timer); };
            }, []);

            useEffect(() => {
                if (!user) return;
                const docRef = window.fb.doc(window.fb.db, 'data', 'current_state');
                return window.fb.onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.classes) setClasses(data.classes);
                        if (data.broadcast) setBroadcast(data.broadcast);
                    } else {
                        window.fb.setDoc(docRef, { classes: CLASSES_DATA, broadcast: '油蔴地天主教小學（海泓道）' });
                    }
                });
            }, [user]);

            const toggleStatus = async (id) => {
                if (viewMode !== 'ADMIN') return;
                const newClasses = classes.map(c => {
                    if (c.id === id) {
                        const next = STATUS_ORDER[(STATUS_ORDER.indexOf(c.status) + 1) % STATUS_ORDER.length];
                        return { ...c, status: next };
                    }
                    return c;
                });
                setClasses(newClasses);
                await window.fb.setDoc(window.fb.doc(window.fb.db, 'data', 'current_state'), { 
                    classes: newClasses 
                }, { merge: true });
            };

            return (
                <div className="h-screen flex flex-col bg-gray-100 overflow-hidden">
                    <header className="bg-white border-b px-6 py-4 flex items-center justify-between shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="bg-blue-800 text-white p-3 rounded-xl font-bold">油天</div>
                            <div>
                                <h1 className="text-xl md:text-2xl font-black text-blue-900 leading-none">油蔴地天主教小學（海泓道）</h1>
                                <p className="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-tighter">Real-time Dismissal Status</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right hidden sm:block mr-4">
                                <div className="text-2xl font-black text-blue-900">{currentTime.toLocaleTimeString()}</div>
                            </div>
                            <div className="bg-gray-200 p-1 rounded-xl flex">
                                <button onClick={() => setViewMode('PARENT')} className={`px-4 py-2 rounded-lg text-xs font-bold ${viewMode === 'PARENT' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500'}`}>家長觀看</button>
                                <button onClick={() => setViewMode('ADMIN')} className={`px-4 py-2 rounded-lg text-xs font-bold ${viewMode === 'ADMIN' ? 'bg-blue-700 text-white shadow-sm' : 'text-gray-500'}`}>管理員</button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 p-4 grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 gap-2 md:gap-3 overflow-y-auto custom-scrollbar">
                        {classes.map(cls => {
                            const cfg = STATUS_CONFIG[cls.status];
                            return (
                                <button key={cls.id} onClick={() => toggleStatus(cls.id)} 
                                    className={`rounded-xl border-2 flex flex-col items-center justify-center p-4 transition-all ${cfg.bgColor} ${cfg.borderColor} ${viewMode === 'ADMIN' ? 'active:scale-95' : ''}`}>
                                    <span className={`text-2xl md:text-4xl font-black mb-1 ${cls.status === 'IN_CLASS' ? 'text-gray-200' : 'text-white'}`}>{cls.id}</span>
                                    <div className={`font-bold text-[10px] md:text-[12px] ${cfg.textColor}`}>
                                        {cfg.label}
                                    </div>
                                </button>
                            );
                        })}
                    </main>

                    <footer className="h-12 bg-blue-900 text-white flex items-center overflow-hidden">
                        <div className="bg-amber-500 px-6 h-full flex items-center font-black italic z-10 text-sm">重要公告</div>
                        <div className="flex-1 whitespace-nowrap overflow-hidden">
                            <div className="animate-marquee inline-block text-lg font-bold">
                                <span className="mx-10">{broadcast}</span>
                                <span className="mx-10">家長請注意學生安全，依序排隊。</span>
                                <span className="mx-10">{broadcast}</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
